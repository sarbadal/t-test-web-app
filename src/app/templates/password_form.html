<head>
    <meta charset="UTF-8">
    <title>Login | T-Test Analysis</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .form-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        .page-title {
            margin: 0 0 16px;
            font-size: 20px;
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 6px;
        }
        label[for="password"] {
            margin-top: 8px;
        }
        input[type="text"], input[type="password"], input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .error-message {
            color: red;
            margin-top: 10px;
            display: none;
        }
        .divider {
            margin: 14px 0 10px;
            text-align: center;
            color: #666;
            font-size: 12px;
        }
        .guest-button {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #666;
            background: #fafafa;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1 class="page-title">Login</h1>
        <form id="passwordForm" method="post">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" placeholder="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" placeholder="password" required>
            <input type="submit" value="Log In">
            <div class="error-message" id="errorMessage">Invalid username or password. Please try again.</div>
        </form>
        <div class="divider">or</div>
        <form method="post">
            <input type="hidden" name="login_mode" value="guest">
            <button type="submit" class="guest-button">Continue as Guest</button>
        </form>
    </div>

</body>
